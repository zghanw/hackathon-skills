description = "Turn the problem statement + rubric into a scoring-aligned angle, urgency hook, and phase plan"
prompt = "Run the hackathon-kickoff skill. Ask for whatever is missing from: the problem statement, the judging rubric/marking scheme with weights, total hackathon duration and deadline, the pitch time limit, and the team roster. Extract judging criteria verbatim, reverse-engineer the concrete proof point for each, draft 2-3 scoring-aligned solution angles, pick one with the team, craft a one-sentence urgency hook naming concrete stakes, build a time-boxed phase plan referencing companion skills (superpowers brainstorming, ui-ux-pro-max, gstack qa/design-review, beautiful-hackathon-slides or pptx, pitch-timebox), and write it all to HACKATHON.md."
